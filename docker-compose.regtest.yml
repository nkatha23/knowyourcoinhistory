
# Bitcoin Core regtest node for integration testing.
# Usage:
#   docker compose -f docker-compose.regtest.yml up -d
#   pytest tests/integration/ -v
#   docker compose -f docker-compose.regtest.yml down -v

services:
  bitcoind:
    image: lncm/bitcoind:v28.0
    command:
      - -regtest
      - -rpcuser=kycc
      - -rpcpassword=kyccpass
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -txindex=1
      - -fallbackfee=0.0001
      - -server=1
      - -printtoconsole=0
    ports:
      - "18443:18443"   # regtest RPC
    healthcheck:
      test:
        - CMD
        - bitcoin-cli
        - -regtest
        - -rpcuser=kycc
        - -rpcpassword=kyccpass
        - -rpcconnect=127.0.0.1
        - getblockchaininfo
      interval: 5s
      timeout: 5s
      retries: 20
